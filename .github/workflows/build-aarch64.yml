name: Build aarch64 binary

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install cross-compiler and deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cmake libsdl2-dev libfreeimage-dev libfreetype6-dev \
            libcurl4-openssl-dev libasound2-dev libgl1-mesa-dev \
            build-essential libboost-all-dev rapidjson-dev

      - name: Build
        run: |
          cmake -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-toolchain.cmake \
                -DCMAKE_BUILD_TYPE=Release .
          make -j$(nproc) emulationstation

      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: emulationstation-aarch64
          path: emulationstation
