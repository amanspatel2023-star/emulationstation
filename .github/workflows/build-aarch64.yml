name: Build aarch64 binary

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cmake make libsdl2-dev libfreeimage-dev libfreetype6-dev \
            libcurl4-openssl-dev libasound2-dev libgl1-mesa-dev \
            build-essential libboost-all-dev rapidjson-dev

      - name: Build
        run: |
          cmake \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            .
          make -j$(nproc) emulationstation

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: emulationstation-aarch64
          path: emulationstation
